<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2d3436">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

        <title>اختبار معلم الشام - احصل على خصم خاص</title>
    <link rel="stylesheet" href="quiz.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" type="image/png" href="images/logo.png">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- إضافة الإعلان في أعلى الصفحة -->
    <div class="ad-container">
        <div id="frame" style="width:728px; height:auto; margin: 20px auto;">
            <iframe data-aa='2381511' src='//ad.a-ads.com/2381511?size=728x90' style='width:728px; height:90px; border:0px; padding:0; overflow:hidden; background-color: transparent;'></iframe>
            <a style="display: block; text-align: right; font-size: 12px;" id="preview-link" href="https://aads.com/campaigns/new/?source_id=2381511&source_type=ad_unit&partner=2381511">اعلن هنا</a>
        </div>
    </div>

    <div class="quiz-container">
        <div class="quiz-content">
            <h2>اختبر معلوماتك عن معلم الشام واستلم عرضك الخاص</h2>
            
            <div class="attempts-info">
                <i class="fas fa-info-circle"></i>
                <span>لديك <strong id="remaining-attempts">3</strong> محاولات متبقية اليوم</span>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
                <div class="progress-text">
                    السؤال <span id="current-question">1</span> من <span id="total-questions">5</span>
                </div>
            </div>

            <div id="question-container">
                <div class="question-content">
                    <div id="question"></div>
                    <div class="options-grid" id="options"></div>
                </div>
            </div>

            <div id="result-container" style="display: none;"></div>
        </div>
    </div>

    <!-- الأصوات التفاعلية -->
    <audio id="correctSound" src="https://assets.mixkit.co/active_storage/sfx/2190/2190-preview.mp3" preload="auto"></audio>
    <audio id="wrongSound" src="https://assets.mixkit.co/active_storage/sfx/2194/2194-preview.mp3" preload="auto"></audio>
    <audio id="successSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
    <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>

    <!-- Watermark Logo -->
    <div class="background-logo"></div>

    <!-- المكتبات المطلوبة -->
    <link rel="preload" as="script" href="quiz.js">
    <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preload" as="font" href="https://fonts.gstatic.com/s/tajawal/v9/Iurf6YBj_oCad4k1l4qkHrFpiQ.woff2" crossorigin>

    <script defer src="quiz.js"></script>
</body>
</html>
